name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 📥 Repo ni olish
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Node.js o‘rnatish
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # yoki 18 / 22 (loyihangizga qarab)

      # 📦 Cache (tezroq install uchun)
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # 📥 Paketlarni o‘rnatish
      - name: Install dependencies
        run: npm ci

      # 🧪 Test (agar mavjud bo‘lsa)
      - name: Run tests
        run: npm test

      # 🏗 Build (agar mavjud bo‘lsa)
      - name: Build project
        run: npm run build
